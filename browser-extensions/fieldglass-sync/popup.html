<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        width: 340px;
        margin: 0;
        padding: 14px;
        color: #1f2937;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 2px;
      }
      .sub {
        color: #6b7280;
        font-size: 12px;
        margin-bottom: 12px;
      }
      button {
        display: block;
        width: 100%;
        padding: 8px 10px;
        margin-bottom: 8px;
        border: 1px solid #8b5cf6;
        border-radius: 6px;
        background: #8b5cf6;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary {
        background: #fff;
        color: #6d28d9;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #status {
        margin: 8px 0;
        font-size: 12px;
        color: #374151;
      }
      #bar {
        height: 6px;
        background: #e5e7eb;
        border-radius: 3px;
        overflow: hidden;
        display: none;
      }
      #bar > div {
        height: 100%;
        width: 0;
        background: #8b5cf6;
        transition: width 0.3s;
      }
      #log {
        margin-top: 8px;
        max-height: 180px;
        overflow-y: auto;
        font-family: ui-monospace, Menlo, monospace;
        font-size: 11px;
        white-space: pre-wrap;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        padding: 6px 8px;
        display: none;
      }
      .warn {
        color: #b45309;
        font-size: 12px;
      }
      a {
        color: #6d28d9;
      }
    </style>
  </head>
  <body>
    <h1>HRX Fieldglass Sync</h1>
    <div class="sub">Order details flow to HRX automatically when you view them. Use the buttons for bulk.</div>

    <div id="unconfigured" class="warn" style="display: none">
      Not configured yet — <a href="#" id="openOptions">set the HRX key</a> first.
    </div>

    <button id="syncQueue">Sync pending orders from HRX</button>
    <button id="scanTab" class="secondary">Scan this tab for orders &amp; sync</button>

    <div id="status"></div>
    <div id="bar"><div></div></div>
    <div id="log"></div>

    <script src="popup.js"></script>
  </body>
</html>
